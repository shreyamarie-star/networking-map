<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>APOS · Room Finder</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Wix+Madefor+Display:wght@400;500;600;700;800&family=Wix+Madefor+Text:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1E0E4B;
  --indigo:#341D8F;
  --violet:#5F0DB8;
  --plum:#671F75;
  --lav:#6D5DA1;
  --magenta:#CB0EB4;
  --red:#E71820;
  --paper:#F3EEE4;
  --paper-edge:#E7DECB;
  --disp:'Wix Madefor Display',system-ui,sans-serif;
  --text:'Wix Madefor Text',system-ui,sans-serif;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%}
body{
  font-family:var(--text);
  color:#fff;
  background:
    radial-gradient(120% 80% at 80% -10%, #4a2aa8 0%, rgba(74,42,168,0) 55%),
    radial-gradient(120% 90% at -10% 110%, #671F75 0%, rgba(103,31,117,0) 50%),
    linear-gradient(180deg,#1E0E4B 0%,#1a0c41 100%);
  background-attachment:fixed;
  min-height:100%;
}
#root{min-height:100%;display:flex;flex-direction:column}

/* ---- layout ---- */
.wrap{max-width:680px;margin:0 auto;width:100%;display:flex;flex-direction:column;flex:1;min-height:100vh;min-height:100dvh}
.topbar{padding:16px 18px 12px;display:flex;align-items:center;gap:12px}
.brand{display:flex;align-items:baseline;gap:9px}
.brand .mark{font-family:var(--disp);font-weight:800;font-size:22px;letter-spacing:.14em;color:#fff;line-height:1}
.brand .dot{width:7px;height:7px;border-radius:50%;background:var(--magenta);box-shadow:0 0 12px var(--magenta);align-self:center}
.brand .sub{font-family:var(--text);font-size:11px;letter-spacing:.26em;text-transform:uppercase;color:var(--lav)}
.tag-loc{margin-left:auto;font-size:11px;letter-spacing:.04em;color:#cabfe9;text-align:right;line-height:1.35;opacity:.85}
.tag-loc b{color:#fff;font-weight:600;display:block;letter-spacing:.02em}

/* ---- search ---- */
.finder{padding:4px 14px 12px;position:sticky;top:0;z-index:40}
.finder-inner{position:relative}
.searchbox{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.07);border:1.5px solid rgba(255,255,255,.16);
  border-radius:16px;padding:13px 14px;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);transition:border-color .2s,background .2s,box-shadow .2s}
.searchbox.act{border-color:var(--magenta);background:rgba(255,255,255,.11);box-shadow:0 0 0 4px rgba(203,14,180,.16)}
.searchbox svg{flex:none}
.searchbox input{flex:1;background:none;border:0;outline:0;color:#fff;font-family:var(--disp);font-weight:500;font-size:16px;letter-spacing:.01em}
.searchbox input::placeholder{color:#9d92c4}
.clearx{flex:none;width:24px;height:24px;border-radius:50%;border:0;display:grid;place-items:center;cursor:pointer;
  background:rgba(255,255,255,.14);color:#fff}
.clearx:hover{background:var(--magenta)}

/* ---- dropdown menu ---- */
.menu{position:absolute;left:0;right:0;top:calc(100% + 8px);background:#241452;border:1px solid rgba(255,255,255,.12);
  border-radius:16px;overflow:hidden;box-shadow:0 24px 60px -18px rgba(0,0,0,.7);max-height:min(56vh,440px);overflow-y:auto;
  -webkit-overflow-scrolling:touch}
.menu-head{padding:9px 16px 5px;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--lav);
  position:sticky;top:0;background:#241452;font-weight:600}
.opt{display:flex;align-items:center;gap:12px;padding:11px 16px;cursor:pointer;border-bottom:1px solid rgba(255,255,255,.05)}
.opt:hover,.opt.hi{background:rgba(203,14,180,.16)}
.opt .pip{flex:none;width:34px;height:34px;border-radius:10px;display:grid;place-items:center;font-family:var(--disp);
  font-weight:700;font-size:13px;color:#fff;background:linear-gradient(135deg,var(--violet),var(--plum))}
.opt.lvl-lobby .pip{background:linear-gradient(135deg,var(--magenta),var(--red))}
.opt .tt{flex:1;min-width:0}
.opt .co{font-family:var(--disp);font-weight:700;font-size:15px;color:#fff;display:flex;align-items:center;gap:7px}
.opt .co .st{font-size:9px;letter-spacing:.12em;font-weight:700;padding:2px 6px;border-radius:5px}
.st.tbc{background:rgba(231,24,32,.18);color:#ff8a8f;border:1px solid rgba(231,24,32,.4)}
.st.special{background:rgba(203,14,180,.18);color:#f3a6e6;border:1px solid rgba(203,14,180,.45)}
.opt .rm{font-size:12.5px;color:#b6a9dd;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.opt .go{flex:none;color:#7c6db0}
.nohit{padding:22px 16px;text-align:center;color:#9d92c4;font-size:14px}

/* ---- map ---- */
.mapcard{margin:2px 14px 0;border-radius:20px;overflow:hidden;background:var(--paper);border:1px solid var(--paper-edge);
  box-shadow:0 28px 70px -28px rgba(0,0,0,.7);position:relative}
.maptop{display:flex;align-items:center;gap:8px;padding:11px 14px;border-bottom:1px solid var(--paper-edge);
  background:linear-gradient(180deg,#fbf8f1,#f3eee4)}
.maptop .ttl{font-family:var(--disp);font-weight:700;font-size:13px;letter-spacing:.04em;color:#3a2d63;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.maptop .hint{margin-left:auto;font-size:11px;color:#9b8fb0;white-space:nowrap;flex:none;padding-left:10px}
.viewport{position:relative;width:100%;height:clamp(340px,54vh,560px);overflow:hidden;background:var(--paper);
  cursor:grab;touch-action:none}
.viewport.drag{cursor:grabbing}
.canvas{position:absolute;top:0;left:0;width:731px;height:793px;transform-origin:0 0}
.canvas img{position:absolute;top:0;left:0;width:731px;height:793px;display:block;user-select:none;-webkit-user-drag:none}
.canvas svg{position:absolute;top:0;left:0;width:731px;height:793px;overflow:visible}

.ctrls{position:absolute;right:12px;bottom:12px;display:flex;flex-direction:column;gap:7px;z-index:5}
.ctrls button{width:38px;height:38px;border-radius:11px;border:1px solid rgba(30,14,75,.14);background:rgba(255,255,255,.92);
  color:var(--ink);font-size:19px;font-family:var(--disp);font-weight:600;cursor:pointer;display:grid;place-items:center;
  box-shadow:0 6px 16px -8px rgba(0,0,0,.4);backdrop-filter:blur(6px)}
.ctrls button:hover{background:#fff;border-color:var(--violet)}
.ctrls button:active{transform:scale(.94)}
.levelflag{position:absolute;left:12px;top:12px;z-index:5;font-family:var(--disp);font-weight:700;font-size:11px;
  letter-spacing:.14em;text-transform:uppercase;color:#fff;padding:7px 12px;border-radius:10px;
  background:linear-gradient(135deg,var(--violet),var(--plum));box-shadow:0 8px 20px -8px rgba(95,13,184,.7);
  display:flex;align-items:center;gap:7px;pointer-events:none;opacity:0;transform:translateY(-6px);transition:.4s}
.levelflag.lobby{background:linear-gradient(135deg,var(--magenta),var(--red))}
.levelflag.show{opacity:1;transform:none}

/* ---- info sheet ---- */
.sheet{margin:12px 14px 18px;border-radius:20px;background:linear-gradient(180deg,#2a1860,#23134f);
  border:1px solid rgba(255,255,255,.12);box-shadow:0 24px 60px -26px rgba(0,0,0,.7);overflow:hidden;
  opacity:0;transform:translateY(14px);transition:.45s cubic-bezier(.22,.61,.18,1);pointer-events:none}
.sheet.show{opacity:1;transform:none;pointer-events:auto}
.sheet-hd{display:flex;align-items:flex-start;gap:14px;padding:18px 18px 14px}
.sheet-pip{flex:none;width:52px;height:52px;border-radius:14px;display:grid;place-items:center;font-family:var(--disp);
  font-weight:800;font-size:20px;color:#fff;background:linear-gradient(135deg,var(--violet),var(--plum));
  box-shadow:0 10px 24px -10px rgba(95,13,184,.8)}
.sheet.lobby .sheet-pip{background:linear-gradient(135deg,var(--magenta),var(--red));box-shadow:0 10px 24px -10px rgba(203,14,180,.8)}
.sheet-co{flex:1;min-width:0}
.sheet-co .ey{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--lav);font-weight:600}
.sheet-co h2{margin:3px 0 0;font-family:var(--disp);font-weight:800;font-size:23px;line-height:1.1;color:#fff;
  display:flex;align-items:center;gap:9px;flex-wrap:wrap}
.sheet-co h2 .st{font-size:10px;letter-spacing:.1em;padding:3px 8px;border-radius:6px;font-weight:700}
.sheet-close{flex:none;width:30px;height:30px;border-radius:50%;border:0;background:rgba(255,255,255,.12);color:#fff;
  cursor:pointer;display:grid;place-items:center}
.sheet-close:hover{background:var(--magenta)}
.sheet-rows{padding:0 18px 18px;display:flex;flex-direction:column;gap:1px}
.row{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-top:1px solid rgba(255,255,255,.08)}
.row .ic{flex:none;width:30px;height:30px;border-radius:9px;background:rgba(255,255,255,.07);display:grid;place-items:center;color:var(--magenta)}
.row .lb{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--lav);font-weight:600}
.row .vl{font-family:var(--disp);font-size:15.5px;color:#fff;font-weight:600;margin-top:2px;line-height:1.35}
.row .vl.dim{font-weight:500;color:#d7cfee;font-size:14px}
.footer{padding:14px 16px 26px;text-align:center;color:#8a7eb5;font-size:11px;letter-spacing:.04em}
.footer b{color:#bcb0e0;font-weight:600}

@keyframes pulse{0%{stroke-opacity:.9}50%{stroke-opacity:.15}100%{stroke-opacity:.9}}
.pulse{animation:pulse 1.8s ease-in-out infinite}
@keyframes ping{0%{r:6;stroke-opacity:.9}100%{r:16;stroke-opacity:0}}
.ping{animation:ping 1.6s ease-out infinite}

@media (max-width:430px){
  .brand .mark{font-size:19px}
  .tag-loc{font-size:10px}
}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

/* ============================= Room Data ============================= */
const ROOMS = [
  // Upper Lobby Level
  { id:'grand', room:'The Grand Ballroom', company:'Main Stage', status:'stage',
    sub:'Talks · Panels · Firesides', level:'lobby',
    dir:'Upper Lobby Level — the main stage hosting all keynotes, panels and fireside chats.',
    x:319, y:27, w:286, h:183 },

  // Lower Promenade — Violet Ballroom (split)
  { id:'violet1', room:'Violet Ballroom 1', company:'ByteDance', status:'tbc', level:'promenade',
    dir:'Centre of the Promenade — left half of the Violet Ballroom.',
    x:335, y:357, w:111, h:133 },
  { id:'violet2', room:'Violet Ballroom 2', company:'CEO Forum', status:'special', level:'promenade',
    dir:'Centre of the Promenade — right half of the Violet Ballroom.',
    x:446, y:357, w:91, h:133 },

  // Lower Promenade — west corridor
  { id:'amaryllis', room:'Amaryllis', company:'Brightcove', status:'confirmed', level:'promenade',
    dir:'West corridor, top room — far left of the Violet Ballroom.',
    x:285, y:363, w:40, h:29 },
  { id:'magnolia', room:'Magnolia', company:'INVIDI', status:'confirmed', level:'promenade',
    dir:'West corridor, 2nd room down — left of the Violet Ballroom.',
    x:285, y:392, w:40, h:40 },
  { id:'camellia', room:'Camellia', company:'Irdeto', status:'confirmed', level:'promenade',
    dir:'West corridor, 3rd room down — left of the Violet Ballroom.',
    x:285, y:432, w:40, h:28 },
  { id:'jasmine', room:'Jasmine', company:'Moloco', status:'confirmed', level:'promenade',
    dir:'West corridor, 4th room down — left of the Violet Ballroom.',
    x:285, y:460, w:40, h:35 },
  { id:'freesia', room:'Freesia', company:'beIN', status:'confirmed', level:'promenade',
    dir:'West corridor, lower-left pair — bottom of the room column.',
    x:270, y:497, w:58, h:39 },
  { id:'aster', room:'Aster', company:'Amazon', status:'tbc', level:'promenade',
    dir:'West corridor, lower-left pair — beside Freesia.',
    x:328, y:497, w:64, h:39 },

  // Lower Promenade — east of Violet Ballroom
  { id:'leatris', room:'Leatris', company:'ReelShort', status:'confirmed', level:'promenade',
    dir:'East side — to the right of the Violet Ballroom.',
    x:537, y:428, w:63, h:97 },
  { id:'iris', room:'Iris', company:'Paramount', status:'confirmed', level:'promenade',
    dir:'East side — right of the Violet Ballroom, below Leatris.',
    x:500, y:491, w:40, h:51 },

  // Lower Promenade — south-west corner
  { id:'casablanca', room:'Casablanca', company:'MNC', status:'confirmed', level:'promenade',
    dir:'South-west corner — beyond the pre-function foyer, far left.',
    x:216, y:624, w:68, h:62 },
  { id:'peony', room:'Peony', company:'Crunchyroll', status:'confirmed', level:'promenade',
    dir:'South-west corner — beyond the foyer, beside Casablanca.',
    x:284, y:624, w:42, h:62 },
  { id:'tulip', room:'Tulip', company:'Disney', status:'confirmed', level:'promenade',
    dir:'South-west corner — beyond the foyer, beside Peony.',
    x:326, y:624, w:46, h:62 },

  // Lower Promenade — south & south-east
  { id:'rose', room:'Rose', company:'Viu', status:'confirmed', level:'promenade',
    dir:'South end — straight past the pre-function foyer.',
    x:450, y:688, w:98, h:47 },
  { id:'gerbera', room:'Gerbera', company:'Netflix', status:'confirmed', level:'promenade',
    dir:'South-east — to the right of the pre-function foyer.',
    x:498, y:612, w:124, h:74 },
];

const LEVELS = {
  lobby:     { label:'Upper Lobby Level',     short:'Lobby Level' },
  promenade: { label:'Lower Promenade Level', short:'Promenade Level' },
};

const STATUS = { tbc:'TBC', special:'FORUM', stage:'STAGE' };

const IMG_W = 731, IMG_H = 793;
const byId = id => ROOMS.find(r => r.id === id);

/* ============================= Icons ============================= */
const I = {
  search: (p) => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" {...p}><circle cx="11" cy="11" r="7" stroke="#cbbff0" strokeWidth="2"/><path d="m20 20-3.2-3.2" stroke="#cbbff0" strokeWidth="2" strokeLinecap="round"/></svg>,
  x:      (p) => <svg width="13" height="13" viewBox="0 0 24 24" {...p}><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" strokeWidth="2.4" strokeLinecap="round"/></svg>,
  go:     (p) => <svg width="16" height="16" viewBox="0 0 24 24" {...p}><path d="M9 6l6 6-6 6" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" fill="none"/></svg>,
  room:   (p) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M4 20V5l9-2v17M4 20h16M13 20V8l7 1v11" stroke="currentColor" strokeWidth="1.8" strokeLinejoin="round"/><circle cx="9.5" cy="12" r="1" fill="currentColor"/></svg>,
  level:  (p) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M3 17l6-4 6 4 6-4M3 11l6-4 6 4 6-4" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/></svg>,
  route:  (p) => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" {...p}><path d="M6 19a3 3 0 0 0 0-6h8a3 3 0 0 0 0-6H8" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/><circle cx="6" cy="19" r="2" fill="currentColor"/><circle cx="18" cy="5" r="2" fill="currentColor"/></svg>,
};

/* ============================= Helpers ============================= */
function initials(r) {
  if (r.status === 'stage') return '★';
  return r.room.slice(0, 2).toUpperCase();
}
function labelOf(r) { return r.room; }

function clampT(scale, tx, ty, vw, vh) {
  const W = IMG_W * scale, H = IMG_H * scale;
  if (W <= vw) tx = (vw - W) / 2; else tx = Math.min(0, Math.max(vw - W, tx));
  if (H <= vh) ty = (vh - H) / 2; else ty = Math.min(0, Math.max(vh - H, ty));
  return { scale, tx, ty };
}

/* ============================= Combobox ============================= */
function Combobox({ query, setQuery, open, setOpen, onPick, selId }) {
  const [hi, setHi] = useState(0);
  const inputRef = useRef(null);
  const boxRef = useRef(null);

  const q = query.trim().toLowerCase();
  const sel = selId ? byId(selId) : null;
  const showAll = !q || (sel && query === labelOf(sel));
  const results = showAll ? ROOMS : ROOMS.filter(r =>
    (r.room + ' ' + (r.sub || '')).toLowerCase().includes(q));

  useEffect(() => { setHi(0); }, [query]);
  useEffect(() => {
    function onDoc(e) { if (boxRef.current && !boxRef.current.contains(e.target)) setOpen(false); }
    document.addEventListener('pointerdown', onDoc);
    return () => document.removeEventListener('pointerdown', onDoc);
  }, []);

  function key(e) {
    if (e.key === 'ArrowDown') { e.preventDefault(); setOpen(true); setHi(h => Math.min(results.length - 1, h + 1)); }
    else if (e.key === 'ArrowUp') { e.preventDefault(); setHi(h => Math.max(0, h - 1)); }
    else if (e.key === 'Enter') { if (open && results[hi]) onPick(results[hi].id); }
    else if (e.key === 'Escape') { setOpen(false); inputRef.current.blur(); }
  }

  const groups = [];
  if (showAll) {
    const lobby = results.filter(r => r.level === 'lobby');
    const prom  = results.filter(r => r.level === 'promenade');
    if (lobby.length) groups.push(['Main Stage · Upper Lobby', lobby]);
    if (prom.length)  groups.push(['Meeting Rooms · Lower Promenade', prom]);
  } else {
    groups.push([results.length ? `${results.length} match${results.length > 1 ? 'es' : ''}` : '', results]);
  }

  let idx = -1;
  return (
    <div className="finder-inner" ref={boxRef}>
      <div className={"searchbox" + (open ? " act" : "")}>
        <I.search />
        <input ref={inputRef} value={query} placeholder="Search a room…"
          onChange={e => { setQuery(e.target.value); setOpen(true); }}
          onFocus={() => setOpen(true)} onKeyDown={key}
          autoComplete="off" autoCorrect="off" spellCheck="false" />
        {query && <button className="clearx" aria-label="Clear" onClick={() => { setQuery(''); onPick(null); inputRef.current.focus(); setOpen(true); }}><I.x /></button>}
      </div>
      {open &&
        <div className="menu" role="listbox">
          {results.length === 0 && <div className="nohit">No room matches "{query}".</div>}
          {groups.map(([head, list]) => list.length ? (
            <div key={head}>
              {head && <div className="menu-head">{head}</div>}
              {list.map(r => { idx++; const here = idx; const active = here === hi;
                return (
                  <div key={r.id} role="option" aria-selected={active}
                    className={"opt lvl-" + r.level + (active ? " hi" : "")}
                    onPointerEnter={() => setHi(here)}
                    onClick={() => onPick(r.id)}>
                    <div className="pip">{initials(r)}</div>
                    <div className="tt">
                      <div className="co">{r.room}
                        {STATUS[r.status] && <span className={"st " + r.status}>{STATUS[r.status]}</span>}
                      </div>
                      {r.sub && <div className="rm">{r.sub}</div>}
                    </div>
                    <span className="go"><I.go /></span>
                  </div>
                );
              })}
            </div>) : null)}
        </div>}
    </div>
  );
}

/* ============================= Map ============================= */
function MapView({ selId, onSelect }) {
  const vpRef = useRef(null);
  const [t, setT] = useState({ scale: 1, tx: 0, ty: 0 });
  const cur = useRef({ scale: 1, tx: 0, ty: 0 });
  const drag = useRef(null);
  const moved = useRef(0);
  const fitScaleRef = useRef(1);
  const selRef = useRef(selId); selRef.current = selId;

  const vp = () => { const el = vpRef.current; return el ? { w: el.clientWidth, h: el.clientHeight } : { w: 360, h: 480 }; };
  const apply = useCallback((v) => { cur.current = v; setT(v); }, []);

  const fit = useCallback((animate) => {
    const { w, h } = vp();
    const s = Math.min(w / IMG_W, h / IMG_H);
    fitScaleRef.current = s;
    const target = clampT(s, (w - IMG_W * s) / 2, (h - IMG_H * s) / 2, w, h);
    apply(target);
  }, [apply]);

  const focus = useCallback((r) => {
    const { w, h } = vp();
    const pad = 0.62;
    let z = Math.min(w * pad / r.w, h * pad / r.h, 3.4);
    z = Math.max(z, fitScaleRef.current * 1.15);
    const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
    apply(clampT(z, w / 2 - z * cx, h / 2 - z * cy, w, h));
  }, [apply]);

  useEffect(() => {
    fit(false);
    const ro = new ResizeObserver(() => { if (!selRef.current) fit(false); });
    if (vpRef.current) ro.observe(vpRef.current);
    return () => ro.disconnect();
  }, []);

  useEffect(() => {
    const r = selId && byId(selId);
    if (r) focus(r); else fit(true);
  }, [selId]);

  function down(e) {
    drag.current = { x: e.clientX, y: e.clientY, tx: cur.current.tx, ty: cur.current.ty };
    moved.current = 0;
    vpRef.current.setPointerCapture?.(e.pointerId);
  }
  function move(e) {
    if (!drag.current) return;
    const dx = e.clientX - drag.current.x, dy = e.clientY - drag.current.y;
    moved.current = Math.max(moved.current, Math.abs(dx) + Math.abs(dy));
    const { w, h } = vp();
    apply(clampT(cur.current.scale, drag.current.tx + dx, drag.current.ty + dy, w, h));
  }
  function up(e) {
    if (drag.current && moved.current <= 6) {
      // tap — hit-test in image coordinates
      const rect = vpRef.current.getBoundingClientRect();
      const imgX = (e.clientX - rect.left - cur.current.tx) / cur.current.scale;
      const imgY = (e.clientY - rect.top  - cur.current.ty) / cur.current.scale;
      // check dot centres first (22px radius in screen space)
      const r22 = 22 / cur.current.scale;
      const hit =
        ROOMS.find(r => { const dx = imgX-(r.x+r.w/2), dy = imgY-(r.y+r.h/2); return dx*dx+dy*dy <= r22*r22; }) ||
        ROOMS.find(r => imgX >= r.x && imgX <= r.x+r.w && imgY >= r.y && imgY <= r.y+r.h);
      if (hit) onSelect(hit.id);
    }
    drag.current = null;
  }

  function zoom(dir) {
    const { w, h } = vp();
    const f = dir > 0 ? 1.5 : 1 / 1.5;
    let s = Math.min(4, Math.max(fitScaleRef.current * 0.92, cur.current.scale * f));
    const cx = (w / 2 - cur.current.tx) / cur.current.scale;
    const cy = (h / 2 - cur.current.ty) / cur.current.scale;
    apply(clampT(s, w / 2 - s * cx, h / 2 - s * cy, w, h));
  }

  function wheel(e) {
    e.preventDefault();
    const { w, h } = vp();
    const f = e.deltaY < 0 ? 1.12 : 1 / 1.12;
    let s = Math.min(4, Math.max(fitScaleRef.current * 0.92, cur.current.scale * f));
    const rect = vpRef.current.getBoundingClientRect();
    const mx = e.clientX - rect.left, my = e.clientY - rect.top;
    const cx = (mx - cur.current.tx) / cur.current.scale;
    const cy = (my - cur.current.ty) / cur.current.scale;
    apply(clampT(s, mx - s * cx, my - s * cy, w, h));
  }

  function roomClick(id) { if (moved.current > 6) return; onSelect(id); }

  const sel = selId ? byId(selId) : null;
  const inv = 1 / t.scale;

  return (
    <div className="mapcard">
      <div className="maptop">
        <span className="ttl">Floor Plan · The Mulia, Bali</span>
        <span className="hint">Tap a room · drag to pan</span>
      </div>
      <div className={"viewport" + (drag.current ? " drag" : "")} ref={vpRef}
        onPointerDown={down} onPointerMove={move} onPointerUp={up} onPointerLeave={up}
        onWheel={wheel} onDoubleClick={() => { setSelId && onSelect(null); }}>

        {sel && <div className={"levelflag show " + sel.level}>
          <I.level /> {LEVELS[sel.level].label}
        </div>}

        <div className="canvas"
          style={{ transform: `translate(${t.tx}px,${t.ty}px) scale(${t.scale})` }}>
          <img src="assets/floorplan.png" alt="The Mulia floor plan" draggable="false" />
          <svg viewBox={`0 0 ${IMG_W} ${IMG_H}`}>
            <defs>
              <mask id="spot">
                <rect x="0" y="0" width={IMG_W} height={IMG_H} fill="#fff" />
                {sel && <rect x={sel.x - 3} y={sel.y - 3} width={sel.w + 6} height={sel.h + 6} rx="6" fill="#000" />}
              </mask>
              <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
                <feGaussianBlur stdDeviation="3" result="b" />
                <feMerge><feMergeNode in="b" /><feMergeNode in="SourceGraphic" /></feMerge>
              </filter>
            </defs>

            {sel && <rect x="0" y="0" width={IMG_W} height={IMG_H} fill="#1E0E4B" opacity="0.5" mask="url(#spot)" />}

            {ROOMS.map(r => {
              if (sel && r.id === sel.id) return null;
              const cx = r.x + r.w / 2, cy = r.y + r.h / 2;
              return (
                <g key={r.id} transform={`translate(${cx} ${cy}) scale(${inv})`} style={{ cursor: 'pointer' }}>
                  <circle r="22" fill="transparent" />
                  <circle r="6" fill="#5F0DB8" opacity={sel ? 0.32 : 0.9} />
                  <circle r="6" fill="none" stroke="#fff" strokeWidth="1.6" opacity={sel ? 0.28 : 0.75} />
                </g>
              );
            })}

            {ROOMS.map(r =>
              <rect key={'h' + r.id} x={r.x} y={r.y} width={r.w} height={r.h}
                fill="transparent" style={{ cursor: 'pointer' }} />
            )}

            {sel && <g>
              <rect x={sel.x} y={sel.y} width={sel.w} height={sel.h} rx="3"
                fill="rgba(203,14,180,0.14)" stroke="#CB0EB4" strokeWidth={3 * inv}
                filter="url(#glow)" style={{ pointerEvents: 'none' }} />
              <rect x={sel.x} y={sel.y} width={sel.w} height={sel.h} rx="3" className="pulse"
                fill="none" stroke="#CB0EB4" strokeWidth={2 * inv} style={{ pointerEvents: 'none' }} />
              <Pin room={sel} inv={inv} />
            </g>}
          </svg>
        </div>

        <div className="ctrls">
          <button onClick={() => zoom(1)} aria-label="Zoom in">+</button>
          <button onClick={() => zoom(-1)} aria-label="Zoom out">−</button>
          <button onClick={() => onSelect(null)} aria-label="Reset view" style={{ fontSize: 13 }}>⤢</button>
        </div>
      </div>
    </div>
  );
}

function Pin({ room, inv }) {
  const cx = room.x + room.w / 2;
  const below = room.y < 70;
  const ay = below ? room.y + room.h : room.y;
  const dir = below ? 1 : -1;
  const label = room.room;
  const wpx = 16 + label.length * 7.2;
  return (
    <g transform={`translate(${cx} ${ay}) scale(${inv})`} style={{ pointerEvents: 'none' }}>
      <line x1="0" y1="0" x2="0" y2={dir * 26} stroke="#E71820" strokeWidth="2.4" />
      <circle cx="0" cy="0" r="5.2" fill="#E71820" stroke="#fff" strokeWidth="2" />
      <circle cx="0" cy="0" r="9" fill="none" stroke="#E71820" strokeWidth="1.6" className="ping" />
      <g transform={`translate(${-wpx / 2} ${dir > 0 ? 26 : -26 - 26})`}>
        <rect x="0" y="0" width={wpx} height="26" rx="13" fill="#1E0E4B" stroke="#CB0EB4" strokeWidth="1.5" />
        <text x={wpx / 2} y="17" textAnchor="middle" fontFamily="'Wix Madefor Display',sans-serif"
          fontWeight="700" fontSize="13" fill="#fff">{label}</text>
      </g>
    </g>
  );
}

/* ============================= Info Sheet ============================= */
function Sheet({ selId, onClose }) {
  const sel = selId ? byId(selId) : null;
  const [shown, setShown] = useState(null);
  useEffect(() => { if (sel) setShown(sel); }, [selId]);
  const r = sel || shown;
  if (!r) return null;
  return (
    <div className={"sheet " + r.level + (sel ? " show" : "")}>
      <div className="sheet-hd">
        <div className="sheet-pip">{initials(r)}</div>
        <div className="sheet-co">
          <div className="ey">{r.level === 'lobby' ? 'Main Stage' : 'Meeting Room'}</div>
          <h2>{r.room}
            {STATUS[r.status] && <span className={"st " + r.status}
              style={r.status === 'tbc' ? { background: 'rgba(231,24,32,.2)', color: '#ff9398' }
                : { background: 'rgba(203,14,180,.2)', color: '#f3a6e6' }}>{STATUS[r.status]}</span>}
          </h2>
        </div>
        <button className="sheet-close" onClick={onClose} aria-label="Close"><I.x /></button>
      </div>
      <div className="sheet-rows">
        <div className="row">
          <div className="ic"><I.level /></div>
          <div><div className="lb">Floor</div><div className="vl">{LEVELS[r.level].label}</div></div>
        </div>
        <div className="row">
          <div className="ic"><I.route /></div>
          <div><div className="lb">Finding it</div><div className="vl dim">{r.dir}</div></div>
        </div>
      </div>
    </div>
  );
}

/* ============================= App ============================= */
function App() {
  const [query, setQuery] = useState('');
  const [open, setOpen] = useState(false);
  const [selId, setSelId] = useState(null);

  function pick(id) {
    setSelId(id);
    if (id) { setQuery(labelOf(byId(id))); setOpen(false); }
  }

  return (
    <div className="wrap">
      <header className="topbar">
        <div className="brand">
          <span className="mark">APOS</span>
          <span className="dot"></span>
          <span className="sub">Room Finder</span>
        </div>
        <div className="tag-loc"><b>The Mulia, Bali</b>Nusa Dua · 2 levels</div>
      </header>

      <div className="finder">
        <Combobox query={query} setQuery={setQuery} open={open} setOpen={setOpen}
          onPick={pick} selId={selId} />
      </div>

      <MapView selId={selId} onSelect={pick} />

      <Sheet selId={selId} onClose={() => { setSelId(null); setQuery(''); }} />

      <div className="footer">
        Select a room above — we'll light the way. ·
        <b> Grand Ballroom</b> hosts all talks, panels &amp; firesides.
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
